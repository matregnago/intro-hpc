---
release:
  stage: deploy
  tags: ['ci.inria.fr', 'linux']
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]\.[0-9]\.[0-9]$/ &&
          $CI_PIPELINE_SOURCE != "schedule"
  dependencies: []
  variables:
    GIT_CONFIG_COUNT: 1
    GIT_CONFIG_KEY_0: "safe.directory"
    GIT_CONFIG_VALUE_0: "*"
    VERSION: release
  script:
    - ./tools/release.sh
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 week
    paths:
      - chameleon-*.tar.gz
