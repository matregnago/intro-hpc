---
.test_script_starpu_plafrim:
  tags: ['plafrim']
  stage: test
  variables:
    SYSTEM: guix
  script:
    - guix time-machine
      --channels=./.gitlab/guix-channels-${VARIANT}.scm
      -- shell --fallback --pure --preserve=SYSTEM --preserve=VERSION
      --preserve=LOGNAME --preserve=BUILD_OPTIONS
      --preserve=TESTS_RESTRICTION --preserve=SLURM_CONSTRAINTS
      -D chameleon-${VARIANT} slurm@23 coreutils inetutils bash-minimal
      -- bash .gitlab/sbatch.sh ${LOGNAME} | tee ${LOGNAME}.log
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 week
    when: always
    paths:
      - guix-channels.scm
      - ${LOGNAME}.log
    reports:
      junit: ${LOGNAME}-junit.xml

.test_script_starpu_plafrim_cuda:
  extends: .test_script_starpu_plafrim
  needs: [build_starpu_cuda]
  variables:
    VERSION: starpu_cuda
    VARIANT: "cuda-mkl"
    LOGNAME: "chameleon-${SYSTEM}-${VERSION}"
    SLURM_CONSTRAINTS: "sirocco"

test_starpu_cuda_master:
  extends: .test_script_starpu_plafrim_cuda
  rules:
    - if: ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH ||
           $CI_COMMIT_BRANCH =~ /^ci-.*$/) &&
          $CI_PIPELINE_SOURCE != "schedule"
  variables:
    TESTS_RESTRICTION: "-R test_shm_gpu"

test_starpu_cuda_mr:
  extends: .test_script_starpu_plafrim_cuda
  rules:
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event" &&
           $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME !~ /^notest-.*$/)
  variables:
    TESTS_RESTRICTION: "-R test_shm_gpu"
