---
.sonarqube:
  stage: analyze
  tags: ['ci.inria.fr', 'linux']
  variables:
    GIT_CLONE_PATH: $CI_BUILDS_DIR/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME
    GIT_CONFIG_COUNT: 1
    GIT_CONFIG_KEY_0: "safe.directory"
    GIT_CONFIG_VALUE_0: "*"
    GIT_DEPTH: "0"
    VERSION: sonarqube
  script:
    - ls -l build*/*.json
    - ls -l chameleon-build*.log
    - ls -l chameleon-test*junit.xml
    - ls -l chameleon_coverage.xml
    - cat *.log > chameleon_build.log
    - ./tools/analysis.sh
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 week
    when: always
    paths:
      - filelist.txt
      - chameleon_cppcheck.xml
      - sonar-project.properties
      - sonar.log

sonarqube_master:
  extends:
    - .sonarqube
    - .only-master
  needs: [test_openmp_master,
          test_parsec_master,
          test_quark_master,
          test_starpu_master,
          test_starpu_simgrid_simu_all,
          coverage_master]

sonarqube_mr:
  extends: .sonarqube
  rules:
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event" &&
           $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME !~ /^notest-.*$/)
      when: manual
      allow_failure: true
  needs: [test_openmp_mr,
          test_parsec_mr,
          test_quark_mr,
          test_starpu_mr,
          test_starpu_simgrid_simu_all,
          coverage_mr]
