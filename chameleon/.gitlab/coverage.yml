#
# Rule to generate the full coverage of the testings in the branches.
# Not used by the master, as it is done in the analysis script for
# sonarqube
#
# Rk: We do not take into account the simgrid lcov file for now, as it
# is empty with new testings
#
---
.coverage:
  stage: coverage
  tags: ['ci.inria.fr', 'linux']
  variables:
    GIT_CLONE_PATH: $CI_BUILDS_DIR/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME
  script:
    - ./tools/coverage.sh
  coverage: /^\s*lines......:\s*\d+.\d+\%/
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 week
    paths:
      - chameleon-*.lcov
      - chameleon.lcov
      - chameleon_coverage.xml
      - coverage/
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: chameleon_coverage.xml

coverage_master:
  extends:
    - .coverage
    - .only-master
  needs: [test_openmp_master,
          test_parsec_master,
          test_quark_master,
          test_starpu_master,
          test_starpu_simgrid_simu_all]

coverage_mr:
  extends: .coverage
  rules:
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event" &&
           $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME !~ /^notest-.*$/)
  needs: [test_openmp_mr,
          test_parsec_mr,
          test_quark_mr,
          test_starpu_mr,
          test_starpu_simgrid_simu_all]
