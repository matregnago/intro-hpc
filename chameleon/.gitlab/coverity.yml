---
coverity:
  stage: analyze
  tags: ['ci.inria.fr', 'linux', 'large']
  rules:
    - if: ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH ||
           $CI_COMMIT_BRANCH =~ /^ci-.*$/) &&
          $CI_PIPELINE_SOURCE != "schedule"
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event" &&
           $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME !~ /^notest-.*$/)
      when: manual
      allow_failure: true
  dependencies: []
  variables:
    VERSION: coverity
  script:
    - ./tools/coverity.sh
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 week
    paths:
      - chameleon.tgz
