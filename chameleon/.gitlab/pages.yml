---
pages:
  stage: deploy
  tags: ['ci.inria.fr', 'linux']
  image: $CI_REGISTRY_IMAGE/pages
  extends: .only-master
  needs: [coverage_master]
  variables:
    VERSION: pages
  script:
    - ./tools/pages.sh
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    expire_in: 1 week
    paths:
      - public
